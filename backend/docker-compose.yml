services:
  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      - SSS_API_KEY=dev-api-key
      - DATABASE_URL=postgres://sss:sss@postgres:5432/sss
      - RPC_URL=https://api.devnet.solana.com
      - RUST_LOG=sss_backend=info,tower_http=info
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sss
      POSTGRES_PASSWORD: sss
      POSTGRES_DB: sss
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  pgdata:
